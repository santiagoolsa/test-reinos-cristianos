<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Reinos Cristianos - 3º ESO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --secondary: #00b894;
            --danger: #ff6b6b;
            --light: #f8f9fa;
            --dark: #2c3e50;
            --border: #e0e0e0;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.05);
        }

        html, body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .progress-section {
            padding: 30px 20px;
            background: var(--light);
        }

        .progress-bar-container {
            background: #e0e0e0;
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 10px;
        }

        .progress-text {
            text-align: center;
            color: var(--dark);
            font-size: 0.95em;
            font-weight: 600;
        }

        .content {
            padding: 40px 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question-number {
            color: var(--primary);
            font-size: 0.85em;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .question-text {
            font-size: 1.3em;
            color: var(--dark);
            margin-bottom: 30px;
            line-height: 1.6;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .option:hover {
            border-color: var(--primary);
            background: #f8f9ff;
            transform: translateX(5px);
        }

        .option.selected {
            border-color: var(--primary);
            background: linear-gradient(135deg, #f0f4ff 0%, #e8ecff 100%);
        }

        .option-radio {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .option.selected .option-radio {
            border-color: var(--primary);
            background: var(--primary);
            box-shadow: inset 0 0 0 4px white;
        }

        .option-text {
            color: var(--dark);
            font-size: 1em;
            flex: 1;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 140px;
            padding: 14px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            -webkit-appearance: none;
        }

        .btn-prev {
            background: #e8e8e8;
            color: var(--dark);
        }

        .btn-prev:hover:not(:disabled) {
            background: #d0d0d0;
            transform: translateY(-2px);
        }

        .btn-prev:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-next {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            flex-grow: 2;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-next:active {
            transform: translateY(0);
        }

        .btn-finish {
            background: linear-gradient(135deg, var(--secondary) 0%, #009373 100%);
            color: white;
            width: 100%;
            font-size: 1.1em;
        }

        .btn-finish:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .results-section {
            display: none;
            padding: 60px 30px;
            text-align: center;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results-section.show {
            display: block;
        }

        .results-icon {
            font-size: 4em;
            margin-bottom: 20px;
            animation: bounce 0.8s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .results-title {
            font-size: 2em;
            color: var(--dark);
            margin-bottom: 20px;
            font-weight: 700;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5em;
            color: white;
            font-weight: 700;
            box-shadow: var(--shadow);
        }

        .score-circle.excellent {
            background: linear-gradient(135deg, var(--secondary) 0%, #009373 100%);
        }

        .score-circle.good {
            background: linear-gradient(135deg, #0984e3 0%, #0060b3 100%);
        }

        .score-circle.average {
            background: linear-gradient(135deg, #fdcb6e 0%, #f39c12 100%);
        }

        .score-circle.poor {
            background: linear-gradient(135deg, var(--danger) 0%, #e84c3d 100%);
        }

        .result-message {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .stats-grid {
            background: var(--light);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 2.2em;
            color: var(--primary);
            font-weight: 700;
        }

        .btn-restart {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            width: 100%;
            font-size: 1.1em;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .content {
                padding: 30px 20px;
            }

            .question-text {
                font-size: 1.15em;
            }

            .button-group {
                flex-direction: column-reverse;
            }

            button {
                min-width: unset;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 30px 15px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .content {
                padding: 25px 15px;
                min-height: 350px;
            }

            .question-text {
                font-size: 1em;
            }

            .option {
                padding: 12px 15px;
            }

            .option-radio {
                width: 20px;
                height: 20px;
            }

            .score-circle {
                width: 120px;
                height: 120px;
                font-size: 2.5em;
            }

            .results-title {
                font-size: 1.5em;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="testView">
            <div class="header">
                <h1>🏰 Test Reinos Cristianos</h1>
                <p>3º ESO - Evalúa tus conocimientos</p>
            </div>

            <div class="progress-section">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-text">
                    Pregunta <span id="currentNum">1</span> de 30
                </div>
            </div>

            <div class="content">
                <div class="question-number" id="questionNum"></div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
            </div>

            <div class="button-group">
                <button class="btn-prev" id="prevBtn" onclick="prevQuestion()" disabled>← Anterior</button>
                <button class="btn-next" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
                <button class="btn-finish hidden" id="finishBtn" onclick="finishTest()">Terminar Test</button>
            </div>
        </div>

        <div id="resultsView" class="results-section">
            <div class="results-icon" id="resultIcon">🎉</div>
            <div class="results-title">¡Prueba Finalizada!</div>
            
            <div class="score-circle" id="scoreCircle">0%</div>
            
            <p class="result-message" id="resultMessage"></p>

            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">Correctas</div>
                    <div class="stat-value" id="correctCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Incorrectas</div>
                    <div class="stat-value" id="incorrectCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Sin Responder</div>
                    <div class="stat-value" id="unansweredCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Calificación</div>
                    <div class="stat-value" id="gradeValue">0/10</div>
                </div>
            </div>

            <button class="btn-restart" onclick="restartTest()">Reintentar Test</button>
        </div>
    </div>

    <script>
        const questions = [
            {q: "¿En qué año comienza la decadencia política y territorial de al-Ándalus?", o: ["1031", "1085", "1147", "1212"], a: 0},
            {q: "¿Cuáles eran los reinos de taifas más importantes mencionados?", o: ["Árabes de Córdoba, Sevilla, Badajoz, Toledo, Saraqosta i Múrcia", "Solo cristianos", "Emiratos y Califatos", "Reinos del norte"], a: 0},
            {q: "¿En qué período gobernaron los almorávides?", o: ["1031-1085", "1085-1144", "1144-1224", "1224-1492"], a: 1},
            {q: "¿En qué año fue la batalla de Sagrajas?", o: ["1086", "1106", "1147", "1212"], a: 0},
            {q: "¿Cuál fue la capital del imperio almorávide?", o: ["Córdoba", "Sevilla", "Marrakesh", "Granada"], a: 2},
            {q: "¿En qué período gobernaron los almohades?", o: ["1085-1144", "1144-1224", "1147-1224", "1224-1492"], a: 2},
            {q: "¿Cuál fue la batalla más importante contra los almohades?", o: ["Batalla de Sagrajas", "Las Navas de Tolosa", "Batalla de Alarcos", "Conquista de Toledo"], a: 1},
            {q: "¿En qué año se produjo la batalla de Las Navas de Tolosa?", o: ["1086", "1147", "1195", "1212"], a: 3},
            {q: "¿Cuándo fue expulsada la dinastía almohade?", o: ["1212", "1224", "1238", "1492"], a: 0},
            {q: "¿Cuál fue el último reino musulmán en la Península?", o: ["Córdoba", "Sevilla", "Granada", "Málaga"], a: 2},
            {q: "¿Cuál fue una de las principales realizaciones artísticas de los primeros reines de taifes?", o: ["Torre de Oro", "Palau de l'Alfajeria de Saraqosta", "Giralda de Sevilla", "Alhambra de Granada"], a: 1},
            {q: "¿Qué monumento mudéjar es mencionado en Niebla?", o: ["Arc de la muralla almorávit", "Torre de Oro", "Alhambra", "Giralda"], a: 0},
            {q: "¿Cuál fue una manifestación artística importante de los almohades?", o: ["Castillo de Monteagudo", "Palau de l'Alfajeria", "Giralda", "Alhambra"], a: 0},
            {q: "¿Qué monumento importante de Sevilla se menciona?", o: ["Torre de Oro", "Giralda de Sevilla", "Alhambra", "Alcázar"], a: 1},
            {q: "¿Cuál es el edificio defensivo más importante mencionado en Badajoz?", o: ["Giralda", "Torre de l'Or", "Alhambra", "Castillo"], a: 1},
            {q: "¿Quién unificó definitivamente Castilla y León?", o: ["Alfonso VI", "Fernando III", "Alfonso X", "Enrique III"], a: 1},
            {q: "¿En qué siglo se consolida Castilla como reino poderoso?", o: ["Siglo XI", "Siglo XII", "Siglo XIII", "Siglo XIV"], a: 2},
            {q: "¿Cuál corona estaba formada por varios reinos independientes?", o: ["Castilla", "Aragón", "Portugal", "Navarra"], a: 1},
            {q: "¿Qué reinos formaban la corona de Aragón?", o: ["Castilla y León", "Aragó, Catalunya, Mallorca y Valencia", "Portugal y Navarra", "Navarra y Castilla"], a: 1},
            {q: "¿Cuál era el tipo de monarquía de Castilla?", o: ["Federativa", "Confederada", "Unitaria", "Electiva"], a: 2},
            {q: "¿Qué institución asesoraba al rey en Castilla?", o: ["Parlamento", "Senado", "Cúria Regia", "Cortes solamente"], a: 2},
            {q: "¿Cuándo se documentan las primeras Cortes en León?", o: ["1076", "1100", "1188", "1212"], a: 2},
            {q: "¿Qué son las Cortes medievales?", o: ["Palacios reales", "Asambleas de representantes de los tres estamentos", "Tribunales", "Guarniciones"], a: 1},
            {q: "¿Cuáles eran los tres estamentos?", o: ["Nobles, clero y pueblo", "Ricos, pobres, clase media", "Guerreros, sacerdotes, campesinos", "Rey, nobles, pecheros"], a: 0},
            {q: "¿En qué siglo se incorporaron los burgueses a la Cúria Regia?", o: ["Siglo XI", "Siglo XII", "Siglo XIII", "Siglo XIV"], a: 2},
            {q: "¿Cuál era la base principal de la economía?", o: ["Comercio marítimo", "Agricultura i ramaderia", "Minería", "Industria"], a: 1},
            {q: "¿Qué institución regulaba la ganadería en Castilla?", o: ["Gremio de pastores", "Honrado Concejo de la Mesta", "Corporación de criadores", "Sindicato de ganaderos"], a: 1},
            {q: "¿Cuál era la importancia de Toledo en la Edad Media?", o: ["Puerto comercial", "Centro de traducción de obras árabes", "Capital política", "Centro minero"], a: 1},
            {q: "¿Qué se comerciaba desde la Península?", o: ["Solo oro y plata", "Textiles, lana y especias", "Solo aceite", "Solo sal y hierro"], a: 1},
            {q: "¿Qué eran los mudéjares?", o: ["Cristianos convertidos al islam", "Musulmanes en territorio cristiano", "Judíos españoles", "Nómadas"], a: 1}
        ];

        let currentQuestion = 0;
        let answers = new Array(30).fill(null);

        function renderQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('questionNum').textContent = `Pregunta ${currentQuestion + 1}`;
            document.getElementById('currentNum').textContent = currentQuestion + 1;
            document.getElementById('questionText').textContent = q.q;

            let html = '';
            q.o.forEach((option, index) => {
                const isSelected = answers[currentQuestion] === index;
                html += `
                    <div class="option ${isSelected ? 'selected' : ''}" onclick="selectOption(${index})">
                        <div class="option-radio"></div>
                        <div class="option-text">${option}</div>
                    </div>
                `;
            });
            document.getElementById('optionsContainer').innerHTML = html;

            const progress = ((currentQuestion + 1) / 30) * 100;
            document.getElementById('progressBar').style.width = progress + '%';

            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            const isLast = currentQuestion === 29;
            document.getElementById('nextBtn').classList.toggle('hidden', isLast);
            document.getElementById('finishBtn').classList.toggle('hidden', !isLast);
        }

        function selectOption(index) {
            answers[currentQuestion] = index;
            renderQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < 29) {
                currentQuestion++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function finishTest() {
            let correct = 0;
            let unanswered = 0;

            answers.forEach((answer, index) => {
                if (answer === null) unanswered++;
                else if (answer === questions[index].a) correct++;
            });

            const incorrect = 30 - correct - unanswered;
            const percentage = Math.round((correct / 30) * 100);
            const grade = (correct / 30) * 10;

            document.getElementById('testView').style.display = 'none';
            document.getElementById('resultsView').classList.add('show');

            document.getElementById('scoreCircle').textContent = percentage + '%';
            document.getElementById('scoreCircle').className = 'score-circle';

            if (percentage >= 90) {
                document.getElementById('scoreCircle').classList.add('excellent');
                document.getElementById('resultMessage').textContent = '¡Excelente! Dominas perfectamente el tema.';
                document.getElementById('resultIcon').textContent = '🏆';
            } else if (percentage >= 70) {
                document.getElementById('scoreCircle').classList.add('good');
                document.getElementById('resultMessage').textContent = '¡Muy bien! Tienes buena comprensión del tema.';
                document.getElementById('resultIcon').textContent = '✨';
            } else if (percentage >= 50) {
                document.getElementById('scoreCircle').classList.add('average');
                document.getElementById('resultMessage').textContent = 'Regular. Necesitas repasar algunos conceptos.';
                document.getElementById('resultIcon').textContent = '📚';
            } else {
                document.getElementById('scoreCircle').classList.add('poor');
                document.getElementById('resultMessage').textContent = 'Insuficiente. Estudia más el tema.';
                document.getElementById('resultIcon').textContent = '💪';
            }

            document.getElementById('correctCount').textContent = correct;
            document.getElementById('incorrectCount').textContent = incorrect;
            document.getElementById('unansweredCount').textContent = unanswered;
            document.getElementById('gradeValue').textContent = grade.toFixed(1) + '/10';
        }

        function restartTest() {
            currentQuestion = 0;
            answers = new Array(30).fill(null);
            document.getElementById('testView').style.display = 'block';
            document.getElementById('resultsView').classList.remove('show');
            renderQuestion();
        }

        renderQuestion();
    </script>
</body>
</html>
